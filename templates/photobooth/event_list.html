{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Event - Re‑Photo Booth</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        h1 {
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }
        .events {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            max-width: 800px;
        }
        .event-card {
            background: #222;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .event-card:hover {
            transform: scale(1.05);
        }
        .event-card img {
            max-width: 100%;
            max-height: 120px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }
        .event-card h3 {
            margin: 0.5rem 0 0;
            font-size: 1.2rem;
        }
        .event-card p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Select Your Event</h1>
    {% if events %}
    <div class="events">
        {% for event in events %}
        <a class="event-card" href="/{{ event.slug }}/">
            {% if event.logo %}
            <img src="{{ event.logo.url }}" alt="{{ event.name }} logo">
            {% endif %}
            <h3>{{ event.name }}</h3>
            {% if event.description %}
            <p>{{ event.description }}</p>
            {% endif %}
        </a>
        {% endfor %}
    </div>
    {% else %}
        <p>No active events.</p>
    {% endif %}
</body>
</html>
