{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event.name }} Gallery - Re‑Photo Booth</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #fff;
            padding: 1rem;
        }
        h1 {
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-form {
            margin-bottom: 1rem;
        }
        .search-form input[type="text"] {
            padding: 0.5rem;
            border-radius: 4px;
            border: none;
            width: 200px;
        }
        .search-form button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background: #58d68d;
            color: #111;
            font-weight: bold;
            cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.5rem;
        }
        .grid a {
            display: block;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            background: #222;
        }
        .grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <h1>{{ event.name }} Gallery</h1>
    <form class="search-form" method="get">
        <input type="text" name="q" placeholder="Search by email" value="{{ query|default:'' }}">
        <button type="submit">Search</button>
    </form>
    <div class="grid">
        {% for photo in photos %}
        <a href="{{ photo.get_absolute_url }}" title="{{ photo.email }}">
            <img src="{{ photo.image.url }}" alt="Photo {{ forloop.counter }}">
        </a>
        {% empty %}
        <p>No photos found.</p>
        {% endfor %}
    </div>
</body>
</html>
